name = "pop-mcp"
main = "src/worker.ts"
compatibility_date = "2026-07-13"

[observability]
enabled = true

# A plain (non-custom-domain) route, since Custom Domains don't support
# wildcards or paths — only whole hostnames. This attaches the worker to
# requests under mcp.popapi.io/mcp* once that DNS record proxies through
# Cloudflare (orange-clouded). Requires the zone to already be on Cloudflare.
[[routes]]
pattern = "mcp.popapi.io/mcp*"
zone_name = "popapi.io"

# POP_ENVIRONMENT controls which POP API base URL (production/staging) the
# worker calls. Customer license keys are never stored here — they arrive
# per-request via the Authorization: Bearer header.
[vars]
POP_ENVIRONMENT = "production"
